#config_version=6
# GEMINI 

coils:

################################## Playfield Coils

                        #PD-16 board 2 bank 0

  c_left_pop:            #white/blue wire
    number: A2-B0-1
    default_pulse_ms: 60
    default_recycle: True
  c_right_pop:            #white/black wire
    number: A2-B0-2
    default_pulse_ms: 60
    default_recycle: True
  c_red_dt_reset:             #white/red wire
    number: A2-B0-3
    default_pulse_ms: 100
  c_white_dt_reset:             #white/grey wire
    number: A2-B0-7
    default_pulse_ms: 100
  c_green_dt_reset:             #white/green wire
    number: A2-B0-5
    default_pulse_ms: 100
  c_yellow_dt_reset:             #white/yellow wire
    number: A2-B0-6
    default_pulse_ms: 100

                        #PD-16 board 2 bank 1
  c_left_sling:             #blue/white wire
    number: A2-B1-0
    default_pulse_ms: 35
    default_recycle: True
  c_right_sling:             #blue/black wire
    number: A2-B1-1
    default_pulse_ms: 35
    default_recycle: True
  c_flipper_left_main:             #blue/orange wire
    number: A2-B1-2
    default_pulse_ms: 15
    default_hold_power: 1
    allow_enable: true   
  c_flipper_right_main:             #blue/grey wire
    number: A2-B1-3
    default_pulse_ms: 15
    default_hold_power: 1
    allow_enable: true   
  c_drain_eject:             #blue wire
    number: A2-B1-4
    default_pulse_ms: 100   #was 150


################################## Cabinet Coils


                        #PD-16 board 5 bank 0
  c_chime_10:
    number: A5-B0-0
    default_pulse_ms: 20
  c_chime_100:
    number: A5-B0-1
    default_pulse_ms: 20
  c_chime_1000:
    number: A5-B0-2
    default_pulse_ms: 20
  c_knocker:
    number: A5-B0-3
    default_pulse_ms: 40
    pulse_events:
      replay: 0
      replay2: 150ms
      shot_extra_ball_hit: 150ms
      shot_special_hit: 150ms
  c_score_motor:
    number: A5-B0-5
    allow_enable: true
  c_relay_1:
    number: A5-B0-6
    default_hold_power: 0.5

                        #PD-16 board 5 bank 1 5V coils for lights    
  c_gi_pf:
    number: A5-B1-0         #red/blk and blk/red to pf connector then red/white and black to sockets
    allow_enable: true
  c_start_button:
    number: A5-B1-1
    allow_enable: true
  c_pop_lights:             #
    number: A5-B1-2
    allow_enable: true


################################## Backbox Coils

                        #PD-16 board 0 bank 0

  c_player_1_10000:
    number: A0-B0-4         #white/orange
    default_pulse_ms: 20
    label: Player 2 10,000        
  c_player_1_1000:
    number: A0-B0-5         #white/green
    default_pulse_ms: 20
    label: Player 2 1,000
  c_player_1_100:
    number: A0-B0-6         #white/yellow
    default_pulse_ms: 20
    label: Player 2 100
  c_player_1_10:
    number: A0-B0-7         #white/black
    default_pulse_ms: 20
    label: Player 2 10

  c_player_2_10000:
    number: A0-B0-3         #grey/orange
    default_pulse_ms: 20
    label: Player 1 10,000
  c_player_2_1000:
    number: A0-B0-2         #grey/white
    default_pulse_ms: 20
    label: Player 1 1,000
  c_player_2_100:
    number: A0-B0-1         #grey/yellow
    default_pulse_ms: 20
    label: Player 1 100
  c_player_2_10:
    number: A0-B0-0         #grey/black
    default_pulse_ms: 20
    label: Player 1 10

                        #PD-16 board 0 bank 1
  c_credit_up:
    number: A0-B1-0         #orange/black
    default_pulse_ms: 20
    label: Credit Up
    pulse_events:
      replay{device.switches.s_credit_up.state != 1}: 0
      replay2{device.switches.s_credit_up.state != 1}: 150ms
  c_credit_down:
    number: A0-B1-1         #orange/yellow
    default_pulse_ms: 20
    label: Credit Down
    pulse_events:
      - player_added{device.switches.s_credit_down.state != 1}
  c_player_unit:
    number: A0-B1-2         #orange/white
    default_pulse_ms: 20
  

                  #  Coils for 5V (socket) lights
                        #PD-16 board 1 bank 0
  c_player_1:                  # blue/black wire
    number: A1-B0-0
    allow_enable: true
  c_player_2:                  # blue/white wire
    number: A1-B0-1
    allow_enable: true
  c_p1_100k:                  # blue/gray wire
    number: A1-B0-2
    allow_enable: true
  c_p2_100k:                  # blue/orange wire
    number: A1-B0-3
    allow_enable: true
  c_gi_bg:                  # blue wire
    number: A1-B0-4
    allow_enable: true

                        #PD-16 board 1 bank 1
  c_game_over:               # orange/black wire
    number: A1-B1-0
    allow_enable: true
  c_canplay_1:                # orange/white wire
    number: A1-B1-1
    allow_enable: true
  c_canplay_2:                # orange/gray wire
    number: A1-B1-2
    allow_enable: true
  c_tilt:                # orange/yellow wire
    number: A1-B1-3
    allow_enable: true
  c_shoot_again:                # orange/blue wire
    number: A1-B1-4
    allow_enable: true

################################## Autofire Coils

autofire_coils:
  left_slingshot:
    coil: c_left_sling
    switch: s_left_sling
  right_slingshot:
    coil: c_right_sling
    switch: s_right_sling
  
  left_pop:
    coil: c_left_pop
    switch: s_left_pop
  right_pop:
    coil: c_right_pop
    switch: s_right_pop